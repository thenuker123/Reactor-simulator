plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nucleares.simulator'
    compileSdk 34

    defaultConfig {
        applicationId "com.nucleares.simulator"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
